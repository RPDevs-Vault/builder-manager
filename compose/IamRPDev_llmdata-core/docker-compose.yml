version: '3.8'

networks:
  llm-backbone:
    driver: bridge
  public-gateway:
    driver: bridge

services:
  # ── Core Databases (Backbone) ──────────────────────────────────────────────
  postgres:
    container_name: postgres-llm
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=llm_memory
      - PGDATA=/var/lib/postgresql/data/18/docker
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/postgres:/var/lib/postgresql/data

  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/qdrant:/qdrant/storage

  # ── Inference Engine (Backbone) ───────────────────────────────────────────
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/ollama:/root/.ollama

  # ── Temporal Orchestration (Backbone) ──────────────────────────────────────
  temporal:
    container_name: temporal-server
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    depends_on:
      - postgres
    environment:
      - BIND_ON_IP=0.0.0.0
      - DB=postgres12
      - SKIP_DB_CREATE=false
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres-llm
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic_config.yaml
      - TEMPORAL_CLI_ADDRESS=127.0.0.1:7233
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/temporal/dynamic_config.yaml:/etc/temporal/dynamic_config.yaml:ro
      - /home/llmuser/llmdata/temporal/config_template.yaml:/etc/temporal/config/config_template.yaml:ro

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_TLS_ENABLE=false
    networks:
      - llm-backbone
      - public-gateway
    ports:
      - 8082:8080
    restart: always

  # ── DeerFlow Application Layer ─────────────────────────────────────────────
  
  # API Gateway (Bridge)
  gateway:
    container_name: deer-flow-gateway
    build:
      context: ./apps/deer-flow
      dockerfile: backend/Dockerfile
    environment:
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_HOME=/app/backend/.deer-flow
    networks:
      - llm-backbone
      - public-gateway
    restart: always
    volumes:
      - /home/llmuser/llmdata/.env:/app/.env:ro
      - /home/llmuser/llmdata/apps/deer-flow/backend/config.yaml:/app/backend/config.yaml:ro
      - /home/llmuser/llmdata/apps/deer-flow/extensions_config.json:/app/backend/extensions_config.json:ro
      - /home/llmuser/llmdata/apps/deer-flow/skills:/app/skills:ro
      - /home/llmuser/llmdata/apps/deer-flow/backend/.deer-flow:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock

  # LangGraph Runtime (Backbone)
  langgraph:
    container_name: deer-flow-langgraph
    build:
      context: ./apps/deer-flow
      dockerfile: backend/Dockerfile
    command: sh -c 'cd /app/backend && uv run langgraph dev --no-browser --no-reload --host 0.0.0.0 --port 2024'
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/apps/deer-flow/backend/config.yaml:/app/backend/config.yaml:ro
      - /home/llmuser/llmdata/apps/deer-flow/skills:/app/skills:ro
      - /home/llmuser/llmdata/apps/deer-flow/backend/.deer-flow:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock

  # Frontend UI (Public)
  frontend:
    container_name: deer-flow-frontend
    build:
      context: ./apps/deer-flow
      dockerfile: frontend/Dockerfile
      target: prod
    environment:
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - NEXT_PUBLIC_BACKEND_BASE_URL=http://gateway:8001
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    networks:
      - public-gateway
    restart: always

  # Reverse Proxy (Public Entrypoint)
  nginx:
    container_name: deer-flow-nginx
    image: nginx:alpine
    ports:
      - "2026:2026"
    volumes:
      - /home/llmuser/llmdata/apps/deer-flow/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public-gateway
    restart: always
    depends_on:
      - frontend
      - gateway

  # ── Coordination Workers (Backbone) ────────────────────────────────────────
  substrate-node-worker:
    container_name: substrate-node-worker
    build:
      context: /home/llmuser/projects/substrate-node
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - SUBSTRATE_API_URL=http://gateway:8001
    networks:
      - llm-backbone
    restart: always
    volumes:
      - /home/llmuser/llmdata/.env:/app/.env:ro
