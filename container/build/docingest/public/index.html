<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="./favicon_new.ico">
    <link rel="icon" type="image/png" href="./favicon_new.png">
    <link rel="manifest" href="%PUBLIC_URL%/favicon_io/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="DocIngest is now open source: turn documentation sites into searchable, MCP-accessible context." />
    <meta name="keywords" content="documentation search, MCP, docs ingestion, coding agents, open source" />
    <meta name="theme-color" content="#000000" />
    <title>DocIngest is Open Source 🎉 | Searchable MCP-Ready Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <main style="min-height: 100vh; display: grid; place-items: center; padding: 32px; background: #fbfaf6; color: #111827; font-family: Inter, system-ui, sans-serif;">
        <section style="max-width: 760px; text-align: center;">
          <div style="display: inline-flex; margin-bottom: 24px; border: 3px solid #111827; border-radius: 10px; background: #f48aa3; padding: 12px 18px; color: #111827; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; box-shadow: 6px 6px 0 #111827;">
            DocIngest is&nbsp;<a href="https://github.com/Amal-David/docingest" style="color: #111827; text-decoration: underline; text-decoration-color: #111827; text-decoration-thickness: 3px; text-underline-offset: 4px;">open source<span aria-hidden="true" style="display: inline-block; margin-left: 4px; transform: translateY(-2px);">↗</span></a>&nbsp;now 🎉
          </div>
          <h1 style="margin: 0 0 16px; font-size: clamp(40px, 8vw, 72px); line-height: 0.95;">
            Searchable docs context for humans and coding agents
          </h1>
          <p style="margin: 0 auto 24px; max-width: 620px; color: #4b5563; font-size: 18px; line-height: 1.6;">
            Turn documentation sites into searchable, MCP-accessible context. Paste a docs URL in the app or choose Add New Docs to index something new.
          </p>
          <p style="color: #6b7280; font-size: 14px;">
            Loading the DocIngest app...
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
