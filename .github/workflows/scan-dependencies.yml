name: Scan Organizations for Dependencies

on:
  schedule:
  - cron: '0 2 * * 0'   # Weekly on Sunday at 2:00 AM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-and-registry:
    name: Scan & Update Registry
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Dependency Scanner
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: python dependency/scan_dependencies.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global commit.gpgsign false
        
        if git status --porcelain | grep -q "dependency_registry.json"; then
          git add dependency_registry.json
          git commit -m "chore: auto-update dependency registry [skip ci]"
          git pull origin main --rebase
          git push origin main
          echo "✅ Registry updated and pushed successfully."
        else
          echo "No changes in dependency registry. Skipping push."
        fi
