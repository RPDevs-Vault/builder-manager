name: Stale Package Cleanup

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
  - cron: '0 13 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Prune Stale GHCR Images
      env:
        GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      run: |
        PACKAGES=$(gh api /orgs/RPDevs-Vault/packages?package_type=container --paginate --jq '.[].name')
        NOW=$(date +%s)
        NINETY_DAYS=7776000

        for pkg in $PACKAGES; do
          echo "Cleaning up $pkg..."
          VERSIONS=$(gh api "/orgs/RPDevs-Vault/packages/container/$pkg/versions" --paginate)
          
          echo "$VERSIONS" | jq -c '.[]' | while read -r ver; do
            ID=$(echo "$ver" | jq -r '.id')
            TAGS=$(echo "$ver" | jq -r '.metadata.container.tags | length')
            UPDATED=$(echo "$ver" | jq -r '.updated_at')
            UPDATED_SEC=$(date -d "$UPDATED" +%s)
            DIFF=$((NOW - UPDATED_SEC))
            DELETE=false
            REASON=""

            if [[ $TAGS -eq 0 ]]; then
              DELETE=true
              REASON="Untagged image"
            fi

            if [[ $DIFF -gt $NINETY_DAYS ]]; then
              DELETE=true
              REASON="Older than 90 days (Last update: $UPDATED)"
            fi

            if [[ "$DELETE" == "true" ]]; then
              echo "Deleting version $ID of $pkg: $REASON"
              gh api -X DELETE "/orgs/RPDevs-Vault/packages/container/$pkg/versions/$ID" --silent || echo "Failed to delete $ID"
            fi
          done
        done
