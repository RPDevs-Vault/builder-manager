name: Docker Collector

defaults:
  run:
    working-directory: container

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  repository_dispatch:
    types: [collect_docker_assets]

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Scan and Collect Assets
      env:
        GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      run: |
        echo "### 🚢 Docker Asset Discovery Report" > discovery_report.md
        echo "Scanning and collecting Docker assets..." >> discovery_report.md
        echo "| Repository | Type | Action Taken |" >> discovery_report.md
        echo "| :--- | :--- | :--- |" >> discovery_report.md

        EXCLUDED_FILE="exclusion_list.md"
        REPOS_USER=$(gh repo list IamRPDev --limit 1000 --json nameWithOwner,isArchived --jq '.[] | select(.isArchived == false) | .nameWithOwner')
        REPOS_ORG=$(gh repo list RPDevs-Vault --limit 1000 --json nameWithOwner,isArchived --jq '.[] | select(.isArchived == false) | .nameWithOwner')
        REPOS="$REPOS_USER $REPOS_ORG"

        for repo in $REPOS; do
          if [ -f "$EXCLUDED_FILE" ] && grep -q "$repo" "$EXCLUDED_FILE"; then
            continue
          fi

          REPO_CLEAN=$(echo "$repo" | sed 's/\//_/g')
          TARGET_DIR="containers/$REPO_CLEAN"
          FILES=$(gh api "/repos/$repo/contents" --jq '.[] | select(.name == "Dockerfile" or .name == "docker-compose.yml" or .name == "compose.yaml" or .name == "compose.yml") | .name' 2>/dev/null || true)
          
          if [[ -n "$FILES" ]]; then
            mkdir -p "$TARGET_DIR"
            for file in $FILES; do
              CONTENT=$(gh api "/repos/$repo/contents/$file" --jq '.content' | base64 -d 2>/dev/null || true)
              
              if [[ "$file" == "Dockerfile" ]]; then
                echo "$CONTENT" > "$TARGET_DIR/Dockerfile"
                IMAGE_NAME="ghcr.io/rpdevs-vault/${REPO_CLEAN,,}"
                echo "docker run -d --name $REPO_CLEAN $IMAGE_NAME:latest" > "$TARGET_DIR/command.txt"
                echo "| \`$repo\` | Dockerfile | Archived to \`$TARGET_DIR/Dockerfile\` |" >> discovery_report.md
              fi
              
              if [[ "$file" == *"compose"* ]]; then
                echo "$CONTENT" > "$TARGET_DIR/$file"
                echo "| \`$repo\` | Compose | Archived to \`$TARGET_DIR/\` |" >> discovery_report.md
              fi
            done

            IMAGE_NAME="ghcr.io/rpdevs-vault/${REPO_CLEAN,,}"
            echo "# 📦 $REPO_CLEAN" > "$TARGET_DIR/README.md"
            echo "- **Source Repo:** [\`$repo\`](https://github.com/$repo)" >> "$TARGET_DIR/README.md"
            echo "- **Image:** \`$IMAGE_NAME:latest\`" >> "$TARGET_DIR/README.md"
            echo "- **Command:** See [\`command.txt\`](./command.txt)" >> "$TARGET_DIR/README.md"
          fi
        done

        # Git config with explicitly disabled GPG signing for the bot
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config commit.gpgsign false

        git add containers/ images/ exclusion_list.md
        git rm -rf build/*/ 2>/dev/null || true

        if ! git diff --staged --quiet; then
          git commit -m "feat: archive discovered Docker assets"
          git pull --rebase origin main || (git rebase --abort && git pull origin main --no-rebase)
          git push origin main
        fi

        if [ -f discovery_report.md ]; then
          gh issue create --repo RPDevs-Vault/builder-manager --title "Weekly Docker Asset Collection Summary" --body-file discovery_report.md --label "enhancement"
        fi

    - name: Cache Report Locally
      run: |
        if [ -f discovery_report.md ]; then
          mkdir -p /home/runner/reports
          cp discovery_report.md /home/runner/reports/
        fi
