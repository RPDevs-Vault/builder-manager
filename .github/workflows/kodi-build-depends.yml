name: Build and Release Depends

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kodi Branch'
        required: true
        default: 'Piers'
        type: choice
        options:
          - Piers
          - Omega

permissions:
  contents: write

jobs:
  build-depends-matrix:
    strategy:
      fail-fast: false
      matrix:
        platform: [android-arm64, android-armv7, osx64, ios-arm64, tvos-arm64, linux-x86_64, windows-x86_64]
    uses: ./.github/workflows/kodi-hybrid-router.yml
    with:
      platform: ${{ matrix.platform }}
      branch: ${{ github.event.inputs.branch || 'Piers' }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
