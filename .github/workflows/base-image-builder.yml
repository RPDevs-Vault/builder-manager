name: Base Image Builder

on:
  schedule:
  - cron: '0 4 * * 1'   # Weekly on Mondays at 04:00
  push:
    branches: [main]
    paths: ['container/base-images/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: rpdevs-vault
  CACHE_BASE: /mnt/sharedroot/github_runners/shared

jobs:
  build-and-scan:
    name: Build & Scan Base Images
    runs-on:
      group: llmadmin01
      labels: [self-hosted, linux, t430]
    permissions:
      contents: write
      packages: write
      security-events: write

    strategy:
      matrix:
        image: [alpine, ubuntu]
      fail-fast: false

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Generate Version Number
      id: version
      run: echo "VERSION=$(date +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.SYNC_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.ORG }}/base-${{ matrix.image }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ steps.version.outputs.VERSION }}
          type=sha,format=short
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}

    - name: Ensure Local Cache Directory Exists
      run: mkdir -p ${{ env.CACHE_BASE }}/docker-cache/base-${{ matrix.image }}

    - name: Build Docker image (Load Locally for Scanning)
      uses: docker/build-push-action@v5
      with:
        context: ./container/base-images/${{ matrix.image }}
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Pull from the local cache, but don't overwrite it until the final push step
        cache-from: type=local,src=${{ env.CACHE_BASE }}/docker-cache/base-${{ matrix.image }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.REGISTRY }}/${{ env.ORG }}/base-${{ matrix.image }}:latest'
        format: 'sarif'
        output: 'trivy-results-${{ matrix.image }}.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Push Docker image and Update Cache
      uses: docker/build-push-action@v5
      with:
        context: ./container/base-images/${{ matrix.image }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=local,src=${{ env.CACHE_BASE }}/docker-cache/base-${{ matrix.image }}
        # Push successful layers into the permanent NFS cache
        cache-to: type=local,dest=${{ env.CACHE_BASE }}/docker-cache/base-${{ matrix.image }},mode=max

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "base-${{ matrix.image }}-${{ steps.version.outputs.VERSION }}" \
          --title "Release base-${{ matrix.image }}-${{ steps.version.outputs.VERSION }}" \
          --notes "Base image release for ${{ matrix.image }} at version ${{ steps.version.outputs.VERSION }}"
