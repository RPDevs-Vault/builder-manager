name: Compile Mageddo DPS (aarch64)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dns-proxy-server-aarch64

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Mageddo Source
        uses: actions/checkout@v4
        with:
          repository: mageddo/dns-proxy-server
          ref: master

      # --- NEW: Setup Java Environment ---
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # --- NEW: Compile Java & Prepare GraalVM Artifacts ---
      - name: Compile Java Artifacts
        run: |
          chmod +x ./gradlew
          # Compiles the source and generates the ./build/artifacts/native-image-source directory
          # Skipping tests (-x test) to speed up the compilation pipeline
          ./gradlew clean build -x test

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Mageddo Docker Build Chain
        run: |
          # 1. Build the aarch64 compile environment
          docker compose build build-linux-aarch64
          
          # 2. Execute the native compilation within the builder container
          docker compose run --rm build-linux-aarch64
          
          # 3. Package the final compiled binary into the runtime image
          docker compose build image-linux-aarch64

      - name: Tag and Push to GHCR
        run: |
          LOWER_REPO=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag defreitas/dns-proxy-server:snapshot-aarch64 $LOWER_REPO:latest
          docker push $LOWER_REPO:latest
