name: Dependency Build Engine

on:
  push:
    paths:
      - 'dependencies/**'
  workflow_dispatch:

jobs:
  build-kodi-depends:
    name: Build Kodi Dependencies (${{ matrix.platform }} - ${{ matrix.host_triplet }})
    runs-on: [self-hosted, linux, local]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            host_triplet: x86_64-linux-gnu
            arch_name: linux-x86_64
          - platform: linux
            host_triplet: aarch64-linux-gnu
            arch_name: linux-arm64
          - platform: android
            host_triplet: aarch64-linux-android
            arch_name: android-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update || true
          sudo apt-get install -y build-essential curl git unzip zip cmake autoconf automake libtool pkg-config gperf default-jre || true

      - name: Build Dependencies
        id: build_step
        run: |
          chmod +x dependencies/kodi/build.sh
          cd dependencies/kodi
          echo "Starting heavy build. Logging to build.log..."
          ./build.sh ${{ matrix.platform }} ${{ matrix.host_triplet }} master > build.log 2>&1 || {
            tail -n 100 build.log
            exit 1
          }
          tail -n 100 build.log

      - name: Upload Build Log on Failure
        if: failure() && steps.build_step.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-log-${{ matrix.arch_name }}
          path: dependencies/kodi/build.log

      - name: Package Toolchain
        run: |
          cd dependencies/kodi/compiled-artifacts
          tar -czvf ../../../kodi-dependencies-${{ matrix.arch_name }}.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kodi-dependencies-${{ matrix.arch_name }}
          path: kodi-dependencies-${{ matrix.arch_name }}.tar.gz
          retention-days: 14

  release-dependencies:
    name: Publish Dependency Release
    needs: build-kodi-depends
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dependency-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: dependencies-${{ github.run_number }}
          name: Pre-compiled Dependencies (Build ${{ github.run_number }})
          files: dependency-artifacts/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
